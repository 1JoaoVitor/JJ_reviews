<!DOCTYPE html>
<html>
<head>
   <title>Baixando App...</title>
   <style>
      body {
         margin: 0;
         padding: 0;
         background: #212529;
         color: white;
         font-family: system-ui, -apple-system, sans-serif;
         display: flex;
         align-items: center;
         justify-content: center;
         min-height: 100vh;
      }
      .container {
         text-align: center;
      }
      .spinner {
         width: 40px;
         height: 40px;
         border: 4px solid rgba(255,255,255,0.3);
         border-top: 4px solid white;
         border-radius: 50%;
         animation: spin 1s linear infinite;
         margin: 0 auto 20px;
      }
      @keyframes spin {
         0% { transform: rotate(0deg); }
         100% { transform: rotate(360deg); }
      }
      p {
         margin: 10px 0;
         font-size: 16px;
      }
      .error {
         color: #ff6b6b;
         margin-top: 20px;
      }
   </style>
</head>
<body>
   <div class="container">
      <div class="spinner"></div>
      <p>Baixando seu app...</p>
      <p style="font-size: 14px; color: #aaa;">Não feche esta página</p>
      <div id="error" class="error" style="display: none;"></div>
   </div>

   <script>
      async function downloadApp() {
         try {
            const response = await fetch('/jj-reviews.apk');
            if (!response.ok) throw new Error('Arquivo não encontrado');
            
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'jj-reviews.apk';
            a.click();
            
            URL.revokeObjectURL(url);
            
            // Voltar para a página anterior após 1 segundo
            setTimeout(() => {
               window.history.back();
            }, 1000);
         } catch (error) {
            console.error('Erro:', error);
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = 'Erro ao baixar. Tente novamente.';
            errorDiv.style.display = 'block';
         }
      }

      // Iniciar download automaticamente
      downloadApp();
   </script>
</body>
</html>
